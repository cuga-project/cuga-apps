[pytest]
testpaths = tests
addopts = -v --tb=short --strict-markers
markers =
    smoke:    Fast endpoint reachability checks. Run by default.
    mcp:      MCP tool integration tests against live servers.
    wiring:   App-side non-LLM REST integration tests.
    llm:      Live LLM round-trips (opt-in with `make test-llm` or `-m llm`).
    needs_key(name): Skip when a specific API key env var isn't set.
    external: Hits an external service (arxiv.org, wikipedia.org, ...). May flake.
