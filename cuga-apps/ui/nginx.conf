server {
    # Non-privileged port (>=1025) so the same image runs on Hugging Face
    # Spaces, which rejects any app_port < 1025. 7860 is HF's canonical
    # default — no significance beyond convention. Local docker-compose
    # bridges :3001 on the host to :7860 in the container.
    listen 7860;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
