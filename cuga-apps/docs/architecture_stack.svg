  <!-- ============== EXTERNAL ============== -->
  <g transform="translate(40, 930)">
    <text x="20" y="20" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">LAYER 5  ·  EXTERNAL DATA SOURCES  +  LOCAL PRIMITIVES</text>
  </g>
  <g transform="translate(40, 957)" filter="url(#shadow)">
    <rect width="1520" height="80" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <text x="24" y="28" font-size="13" font-weight="700" fill="#0f172a">External APIs / local resources hit by the MCP layer</text>
