<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowDownIndigo" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowDownTeal" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect width="1600" height="1080" fill="#fafbfc"/>

  <!-- ============== TITLE ============== -->
  <text x="800" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">cuga-apps  —  System Architecture</text>
  <text x="800" y="72" text-anchor="middle" font-size="15" fill="#64748b">24 agent apps  ·  8 MCP servers  ·  one shared tool fabric  ·  one umbrella UI</text>

  <!-- ============== CROSS-CUTTING STRIP ============== -->
  <g transform="translate(40, 100)" filter="url(#shadow)">
    <rect width="1520" height="70" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="20" y="28" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">CROSS-CUTTING INFRA</text>

    <!-- 4 mini cards -->
    <g transform="translate(190, 16)">
      <rect width="290" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="14" y="18" font-size="11" font-weight="700" fill="#475569">apps/_ports.py</text>
      <text x="14" y="33" font-size="11" fill="#64748b">single source of truth for every port</text>
    </g>
    <g transform="translate(490, 16)">
      <rect width="290" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="14" y="18" font-size="11" font-weight="700" fill="#475569">apps/_llm.py</text>
      <text x="14" y="33" font-size="11" fill="#64748b">multi-provider: rits · anthropic · openai · watsonx · ollama · litellm</text>
    </g>
    <g transform="translate(790, 16)">
      <rect width="320" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="14" y="18" font-size="11" font-weight="700" fill="#475569">tests/  —  120 integration tests</text>
      <text x="14" y="33" font-size="11" fill="#64748b">smoke · mcp · wiring · llm  (~13s default, $0)</text>
    </g>
    <g transform="translate(1120, 16)">
      <rect width="380" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="14" y="18" font-size="11" font-weight="700" fill="#475569">Docker — Dockerfile.mcp + Dockerfile.apps</text>
      <text x="14" y="33" font-size="11" fill="#64748b">one MCP image · 8 entrypoints  ·  one apps image hosting all 24</text>
    </g>
  </g>

  <!-- ============== USER LAYER ============== -->
  <g transform="translate(620, 200)" filter="url(#shadow)">
    <rect width="360" height="58" rx="29" fill="#0f172a"/>
    <text x="180" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">User browser</text>
    <text x="180" y="46" text-anchor="middle" font-size="11.5" fill="#cbd5e1">prompts · clicks · views agent output</text>
  </g>

  <line x1="800" y1="262" x2="800" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ============== UI LAYER ============== -->
  <g transform="translate(40, 295)">
    <text x="20" y="20" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">LAYER 1  ·  USER INTERFACE</text>
  </g>
  <g transform="translate(420, 320)" filter="url(#shadow)">
    <rect width="350" height="80" rx="12" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
