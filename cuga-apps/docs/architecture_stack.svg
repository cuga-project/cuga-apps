      <text x="60" y="19" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0f172a">IBM Stack · 3</text>
    </g>

    <!-- pattern note -->
    <text x="24" y="103" font-size="11.5" fill="#475569"><tspan font-weight="700" fill="#312e81">Per-app pattern  →</tspan>  FastAPI shell  ·  POST /ask  ·  GET /  (HTML)  ·  CugaAgent(model=create_llm, tools=load_tools([...]), special_instructions=_SYSTEM)</text>
  </g>

  <!-- bridge arrow -->
  <line x1="800" y1="591" x2="800" y2="618" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowDownIndigo)"/>
  <text x="815" y="610" font-size="11" font-style="italic" fill="#4338ca">load_tools(["web", "knowledge", ...])</text>

  <!-- ============== BRIDGE LAYER ============== -->
  <g transform="translate(40, 624)">
    <text x="20" y="20" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">LAYER 3  ·  ADAPTER  /  BRIDGE</text>
  </g>
  <g transform="translate(280, 650)" filter="url(#shadow)">
    <rect width="1040" height="62" rx="12" fill="#312e81"/>
    <text x="24" y="26" font-size="14" font-weight="700" fill="#fff">apps/_mcp_bridge.py  —  LangChain ↔ MCP adapter</text>
    <text x="24" y="48" font-size="12" fill="#c7d2fe">Apps call <tspan font-family="monospace" fill="#fde68a">load_tools([servers])</tspan> · returns LangChain StructuredTools that round-trip via streamable HTTP. Non-LLM <tspan font-family="monospace" fill="#fde68a">call_tool()</tspan> path for schedulers / watchers.</text>
  </g>

  <line x1="800" y1="714" x2="800" y2="742" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowDownTeal)"/>
  <text x="815" y="734" font-size="11" font-style="italic" fill="#0c4a6e">streamable HTTP · MCP protocol</text>

