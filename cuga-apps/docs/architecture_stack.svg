  <!-- footer -->
  <text x="800" y="1064" text-anchor="middle" font-size="11.5" fill="#64748b">Each layer talks to the next over HTTP only — no in-process imports across the apps↔MCP boundary. Same protocol everywhere = uniform tests, uniform tool explorer.</text>
</svg>
