    <rect x="20" y="56" width="60" height="18" rx="9" fill="#eef2ff"/>
    <text x="50" y="69" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">:3001</text>
    <text x="90" y="69" font-size="11" fill="#64748b">tile per app · MCP-usage chips</text>
  </g>
  <g transform="translate(830, 320)" filter="url(#shadow)">
    <rect width="350" height="80" rx="12" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#1e1b4b">MCP Tool Explorer</text>
    <text x="20" y="48" font-size="12" fill="#475569">browse + invoke any MCP tool</text>
    <rect x="20" y="56" width="60" height="18" rx="9" fill="#eef2ff"/>
    <text x="50" y="69" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">:28900</text>
    <text x="90" y="69" font-size="11" fill="#64748b">forms from input schemas</text>
  </g>

