<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1600" height="1080" fill="#fafbfc"/>

  <!-- ============== TITLE ============== -->
  <text x="800" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Invocable API  ·  why it scales</text>
  <text x="800" y="70" text-anchor="middle" font-size="14" fill="#64748b">Closed-loop validation (top) + the reuse moat (bottom)  ·  worked through qid 28 and qid 47</text>

  <!-- ============== SECTION A: INSIDE seq_validate ============== -->
  <g transform="translate(40, 100)">
    <rect width="1520" height="36" rx="6" fill="#f59e0b"/>
    <text x="14" y="24" font-size="13" font-weight="700" fill="#fff">A.  INSIDE seq_validate(qid=28)  ·  the closed-loop oracle that gates every emitted record</text>
  </g>

  <!-- Two parallel paths -->
  <!-- LEFT PATH: GOLD -->
  <g transform="translate(60, 156)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#0c4a6e" letter-spacing="0.08em">PATH 1  ·  ORACLE</text>
  </g>
  <g transform="translate(60, 176)" filter="url(#shadow)">
    <rect width="700" height="64" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0c4a6e">Step 1  ·  load gold SQL from Bird</text>
    <rect x="20" y="32" width="660" height="22" rx="5" fill="#0f172a"/>
    <text x="28" y="46" font-size="10" font-family="monospace" fill="#cbd5e1">SELECT T2.School, T2.DOC FROM frpm T1 INNER JOIN schools T2 ... WHERE FundingType='Locally funded' AND ...</text>
  </g>

  <line x1="410" y1="240" x2="410" y2="266" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <g transform="translate(60, 268)" filter="url(#shadow)">
    <rect width="700" height="64" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0c4a6e">Step 2  ·  execute on real SQLite (mode=ro)</text>
    <text x="20" y="44" font-size="11" font-family="monospace" fill="#475569">_rows_to_payload(con.execute(q["SQL"]))</text>
    <text x="20" y="58" font-size="11" fill="#475569">→ <tspan font-weight="700" fill="#0c4a6e">gold_rows = 57 tuples of (School, DOC)</tspan></text>
  </g>

  <line x1="410" y1="332" x2="410" y2="358" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <g transform="translate(60, 360)" filter="url(#shadow)">
    <rect width="700" height="50" rx="10" fill="#ecfeff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#0c4a6e">Step 3  ·  normalize</text>
    <text x="20" y="40" font-size="11" font-family="monospace" fill="#475569">_normalize_for_compare(gold_rows) → list[tuple]  ·  floats round to 6dp  ·  sort within rows  ·  sort row-list</text>
  </g>

  <!-- RIGHT PATH: SEQUENCE -->
  <g transform="translate(840, 156)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#78350f" letter-spacing="0.08em">PATH 2  ·  RECORDED SEQUENCE</text>
  </g>
  <g transform="translate(840, 176)" filter="url(#shadow)">
    <rect width="700" height="64" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#78350f">Step 1  ·  load sequence from sequences table</text>
    <text x="20" y="44" font-size="11" font-family="monospace" fill="#475569">[{tool:"avg_…",args:{funding_type:"Locally funded"},bind:"avg"},</text>
    <text x="20" y="58" font-size="11" font-family="monospace" fill="#475569">  {tool:"schools_…",args:{funding_type:"Locally funded",threshold:"{{avg.avg_difference}}"}}]</text>
  </g>

  <line x1="1190" y1="240" x2="1190" y2="266" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <g transform="translate(840, 268)" filter="url(#shadow)">
    <rect width="700" height="64" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#78350f">Step 2  ·  _run_sequence with {{var}} binding</text>
    <text x="20" y="40" font-size="11" fill="#475569">A. exec step 1 → <tspan font-family="monospace">{avg_difference: 16.7}</tspan> · bind to <tspan font-family="monospace" font-weight="700" fill="#78350f">avg</tspan></text>
    <text x="20" y="56" font-size="11" fill="#475569">B. resolve <tspan font-family="monospace">{{avg.avg_difference}}</tspan> → 16.7 · exec step 2 → <tspan font-weight="700" fill="#78350f">57 rows</tspan></text>
  </g>

  <line x1="1190" y1="332" x2="1190" y2="358" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <g transform="translate(840, 360)" filter="url(#shadow)">
    <rect width="700" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#78350f">Step 3  ·  normalize</text>
    <text x="20" y="40" font-size="11" font-family="monospace" fill="#475569">_normalize_for_compare(final_rows)  ·  same coercion handles dict-of-list-of-dicts vs SQL tuples</text>
  </g>

  <!-- Convergence -->
  <line x1="410" y1="412" x2="700" y2="442" stroke="#475569" stroke-width="1.5"/>
  <line x1="1190" y1="412" x2="900" y2="442" stroke="#475569" stroke-width="1.5"/>

  <!-- Comparator -->
  <g transform="translate(560, 444)" filter="url(#shadow)">
    <rect width="480" height="78" rx="12" fill="#312e81"/>
    <text x="240" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">SET-EQUALITY  ·  normalized_gold == normalized_final</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#c7d2fe">handles row order, float tolerance, column-order mismatches</text>
    <rect x="180" y="56" width="120" height="16" rx="8" fill="#fbbf24"/>
    <text x="240" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">passed: true</text>
  </g>

  <line x1="800" y1="524" x2="800" y2="546" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Persist row -->
  <g transform="translate(60, 548)" filter="url(#shadow)">
    <rect width="1480" height="58" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0f172a">Step 4  ·  persist outcome to <tspan font-family="monospace" fill="#475569">validations</tspan> table  ·  emit on dataset_emit</text>
    <text x="20" y="46" font-size="11" font-family="monospace" fill="#475569">INSERT OR REPLACE INTO validations (question_id, passed, final_result, gold_result, failure_msg, validated_at) → <tspan fill="#10b981" font-weight="700">dataset.json[28].validated = true</tspan></text>
  </g>

  <!-- Side note: failure path -->
  <g transform="translate(60, 624)">
    <rect width="1480" height="36" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="20" y="22" font-size="11.5" fill="#991b1b">If <tspan font-weight="700">passed = false</tspan> → <tspan font-family="monospace">failure_msg = "result mismatch — gold=[...] final=[...]"</tspan>  ·  agent reads this, fixes a tool (re-register), runs seq_validate again. Up to 2 retries.</text>
  </g>

  <!-- ============== SECTION B: REUSE MOAT ============== -->
  <g transform="translate(40, 690)">
    <rect width="1520" height="36" rx="6" fill="#10b981"/>
    <text x="14" y="24" font-size="13" font-weight="700" fill="#fff">B.  THE REUSE MOAT  ·  why the API surface shrinks as the batch progresses</text>
  </g>

  <!-- 3 columns: qid 28 state | qid 47 reuses | growth curve -->

  <!-- COL 1: After qid 28 -->
  <g transform="translate(40, 746)" filter="url(#shadow)">
    <rect width="490" height="306" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <rect width="490" height="38" rx="14" fill="#1e293b"/>
    <rect y="26" width="490" height="12" fill="#1e293b"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#fff">After qid 28  ·  registry state</text>

    <text x="20" y="62" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">2 TOOLS REGISTERED</text>

    <g transform="translate(20, 74)">
      <rect width="450" height="78" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
      <text x="14" y="20" font-size="12" font-weight="700" fill="#3b0764" font-family="monospace">avg_enrollment_difference_by_funding_type</text>
      <text x="14" y="38" font-size="10.5" fill="#475569">params:  funding_type: str  (slot examples: Directly funded, …)</text>
      <text x="14" y="54" font-size="10.5" fill="#475569">desc:    AVG of (Enrollment K-12 − Enrollment Ages 5-17)</text>
      <text x="14" y="70" font-size="10.5" fill="#475569">         filtered by FundingType.</text>
    </g>

    <g transform="translate(20, 162)">
      <rect width="450" height="78" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
      <text x="14" y="20" font-size="12" font-weight="700" fill="#3b0764" font-family="monospace">schools_with_enrollment_difference_above_funding</text>
      <text x="14" y="38" font-size="10.5" fill="#475569">params:  funding_type: str, threshold: float</text>
      <text x="14" y="54" font-size="10.5" fill="#475569">desc:    schools whose K-12 − 5-17 enrollment exceeds</text>
      <text x="14" y="70" font-size="10.5" fill="#475569">         a threshold, filtered by FundingType.</text>
    </g>

    <text x="20" y="262" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">SEQUENCES TABLE</text>
    <text x="20" y="280" font-size="11.5" fill="#475569">qid 28 → 2-step sequence  ·  validated  ·  passed=true</text>
    <text x="20" y="296" font-size="11" fill="#64748b" font-style="italic">Both tools parametric — the slot funding_type lifts the question's literal.</text>
  </g>

  <!-- arrow -->
  <line x1="540" y1="900" x2="568" y2="900" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="554" y="888" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">later</text>

  <!-- COL 2: qid 47 reuses -->
  <g transform="translate(575, 746)" filter="url(#shadow)">
    <rect width="490" height="306" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <rect width="490" height="38" rx="14" fill="#10b981"/>
    <rect y="26" width="490" height="12" fill="#10b981"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#fff">qid 47  ·  reuses what's there</text>

    <text x="20" y="62" font-size="11" fill="#475569" font-style="italic">"What's the average enrollment difference for directly-funded schools?"</text>

    <text x="20" y="92" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">AGENT'S DECISION</text>

    <g transform="translate(20, 104)">
      <rect width="450" height="32" rx="6" fill="#ecfeff" stroke="#0ea5e9" stroke-width="1"/>
      <text x="14" y="20" font-size="11" font-family="monospace" fill="#0c4a6e"><tspan font-weight="700">tool_list(db)</tspan>  →  finds avg_enrollment_difference_by_funding_type</text>
    </g>

    <g transform="translate(20, 144)">
      <rect width="450" height="46" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="14" y="18" font-size="11" font-family="monospace" fill="#065f46"><tspan font-weight="700">tool_call</tspan>(name="avg_enrollment_difference_by_funding_type",</text>
      <text x="14" y="34" font-size="11" font-family="monospace" fill="#065f46">          args={funding_type: <tspan fill="#dc2626" font-weight="700">"Directly funded"</tspan>})</text>
    </g>

    <g transform="translate(20, 198)">
      <rect width="450" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="14" y="20" font-size="11" font-family="monospace" fill="#78350f"><tspan font-weight="700">seq_record</tspan> + <tspan font-weight="700">seq_validate</tspan>  →  passed=true  ·  no new tool</text>
    </g>

    <g transform="translate(20, 240)">
      <rect width="450" height="50" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#065f46">Net effect on registry:  +0 tools  ·  +1 question covered</text>
      <text x="14" y="40" font-size="10.5" fill="#475569" font-style="italic">tool_usage.json: avg_enrollment_difference_by_funding_type.used_by_question_ids = [28, 47]</text>
    </g>
  </g>

  <!-- COL 3: Growth curve -->
  <g transform="translate(1110, 746)" filter="url(#shadow)">
    <rect width="450" height="306" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <rect width="450" height="38" rx="14" fill="#1e293b"/>
    <rect y="26" width="450" height="12" fill="#1e293b"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#fff">API surface vs. questions covered</text>

    <!-- Mini chart -->
    <!-- axes -->
    <line x1="60" y1="240" x2="420" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="60" y1="60" x2="60" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>

    <!-- "naive" line — diagonal y=x (89 unique tools for 89 questions) -->
    <line x1="60" y1="240" x2="420" y2="70" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="4,3"/>
    <text x="372" y="64" font-size="11" font-weight="700" fill="#dc2626">naive: 89 unique tools</text>

    <!-- "with reuse" curve — concave, plateaus around y=80 (~25-30 tools) -->
    <path d="M 60 240 Q 180 130 280 110 T 420 100" stroke="#10b981" stroke-width="2.5" fill="none"/>
    <text x="290" y="148" font-size="11" font-weight="700" fill="#065f46">with reuse: ~25-30 tools</text>
    <text x="290" y="162" font-size="10" fill="#10b981">across all 89 questions</text>

    <!-- markers -->
    <circle cx="60" cy="240" r="4" fill="#10b981"/>
    <text x="48" y="258" font-size="10" fill="#475569">qid 0</text>
    <circle cx="155" cy="160" r="4" fill="#10b981"/>
    <text x="138" y="178" font-size="10" fill="#475569">qid 28</text>
    <circle cx="190" cy="142" r="4" fill="#10b981"/>
    <text x="172" y="132" font-size="10" fill="#475569">qid 47</text>
    <text x="174" y="120" font-size="9" fill="#10b981" font-weight="700" font-style="italic">(no growth)</text>

    <text x="240" y="262" text-anchor="middle" font-size="10" fill="#94a3b8">questions processed →</text>
    <text x="40" y="150" font-size="10" fill="#94a3b8" transform="rotate(-90, 40, 150)">tools registered →</text>

    <!-- Footer line -->
    <text x="20" y="290" font-size="11" fill="#475569" font-style="italic">The "tools reused across questions" tile is the meta-moat metric.</text>
  </g>
</svg>
