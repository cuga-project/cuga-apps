# Use docker's embedded DNS so the backend hostname resolves at request time
# rather than startup. Otherwise nginx refuses to start when the backend
# container isn't yet reachable (cold-boot ordering, standalone tests, etc.).
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Static assets — fall through to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. Strip the /api prefix
    # via rewrite — with a variable in proxy_pass, the trailing-slash
    # form doesn't do prefix substitution, so we rewrite explicitly.
    location /api/ {
        # `set` must come BEFORE `rewrite ... break` — break halts the
        # rewrite phase, so anything after wouldn't execute.
        set $backend "chief-of-staff-backend";
        rewrite           ^/api/(.*)$ /$1 break;
        proxy_pass         http://$backend:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
