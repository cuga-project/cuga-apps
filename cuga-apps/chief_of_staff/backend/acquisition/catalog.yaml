# Phase 2 catalog — curated MCP servers the AcquisitionAgent can offer.
#
# For phase 2 these are all local mcp_servers/* the user already runs.
# The default adapter loads only `web,local,code` so the others appear as
# acquirable. Phase 3 will add OpenAPI-generated servers; phase 4 will add
# browser-task entries.
#
# Each entry needs:
#   id           stable string identifier
#   name         display name
#   description  one-line summary shown in the consent modal
#   capabilities list of short phrases the matcher scores against the gap
#   kind         "mcp_local"   — one of apps/_ports.py MCP_PORTS keys
#                "mcp_url"     — arbitrary HTTP URL  (phase 2.5+)
#                "openapi_gen" — generated by phase 3
#   target       value that goes with kind (server name, URL, or spec URL)
#   auth         list of secret keys needed (phase 3 wires this; phase 2
#                local servers all use shared env vars from apps/.env)

entries:
  - id: knowledge
    name: Knowledge MCP
    description: Wikipedia, arXiv, Semantic Scholar — encyclopedic and academic lookup.
    capabilities:
      - wikipedia search
      - encyclopedia lookup
      - arxiv search
      - academic paper search
      - definition lookup
    kind: mcp_local
    target: knowledge
    auth: []

  - id: geo
    name: Geo MCP
    description: Geocoding, weather, attractions, hiking trails (no API key needed for basics).
    capabilities:
      - weather lookup
      - geocoding
      - location search
      - find attractions
      - find hikes
      - latitude longitude
    kind: mcp_local
    target: geo
    auth: []

  - id: finance
    name: Finance MCP
    description: Stock quotes, market summaries, FX rates.
    capabilities:
      - stock quote
      - stock price
      - market data
      - currency exchange
      - ticker lookup
    kind: mcp_local
    target: finance
    auth: []

  - id: text
    name: Text MCP
    description: Document parsing, OCR, transcript extraction.
    capabilities:
      - extract text from pdf
      - parse document
      - ocr
      - transcript
      - text extraction
    kind: mcp_local
    target: text
    auth: []

  - id: invocable_apis
    name: Invocable APIs MCP
    description: Generated invocable APIs from the Bird benchmark suite.
    capabilities:
      - invoke api
      - sql to api
      - bird benchmark
    kind: mcp_local
    target: invocable_apis
    auth: []
